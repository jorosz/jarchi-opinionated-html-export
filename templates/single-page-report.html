<!--
Single-page HTML Export v3
Changed for exporting a single view!
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{modelTitle}} model export</title>
	{{styleTag}}

	<!-- <link rel="stylesheet" href="{{cssAbsolutePath}}" />		 -->

</head>
	<body>
		<!-- SVG diagram symbol definitions (hidden, referenced by each view) -->
		<svg style="display:none" aria-hidden="true">{{svgDefs}}</svg>

		<header id="main-header" class="top-header ">
			<span class="title">{{modelTitle}}</span>
		</header>

		<main>
			{{views}}
		</main>

		{{scriptTag}}
		<script>
			document.querySelectorAll('.diagram').forEach(function(svg) {
				var pz = Panzoom(svg, { maxScale: 8 });
				var scroll = svg.parentElement;
				svg.addEventListener('wheel', pz.zoomWithWheel);

				var btns = scroll.querySelectorAll('.zoom-btn');
				btns[0].addEventListener('click', function() { pz.zoomIn(); });
				btns[1].addEventListener('click', function() { pz.zoomOut(); });
				btns[2].addEventListener('click', function() { pz.reset(); });
			});
		</script>
		</body>
</html>
