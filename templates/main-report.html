<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{modelTitle}} model export</title>
	{{styleTag}}

	<!-- <link rel="stylesheet" href="{{cssAbsolutePath}}" />		 -->

</head>
	<body>
		<!-- All inputs must be at the begining of the page (CSS rules uses 'input ~ *' selector) -->
		<!-- Checkbox used to show/hide the sidebar -->
		<input id="sidebar" class="hidden" type="checkbox" checked>
		<!-- Checkbox checked only when JavaScript is enabled -->
		<input id="javascript" class="hidden" type="checkbox">
		<!-- Radio in the views group: selecting a view deselects this and vice versa -->
		<input id="show-all-views" class="hidden" type="radio" name="views">

		<!-- One checkbox per view -->
		{{inputCheckbox}}

		<!-- SVG diagram symbol definitions (hidden, referenced by each view) -->
		<svg style="display:none" aria-hidden="true">{{svgDefs}}</svg>

		<!-- Report really starts here with the sidebar -->
		<aside class="sidebar">
			<header class="top-header">
				<span>{{labels.sidebarTitle}}</span>
				<label for="sidebar" id="hide-sidebar" class="icon close"></label>
			</header>
			<nav class="secondary">
				<div class="tree">
					<label for="show-all-views" class="entire-model">{{labels.allViews}}</label>
					{{treeContent}}
				</div>
			</nav>
		</aside>

		<header id="main-header" class="top-header expandable">
			<label for="sidebar" id="show-sidebar" class="icon menu"></label>
			<span class="title">{{modelTitle}}</span>
		</header>

		<main class="expandable">
			{{views}}
		</main>

		{{scriptTag}}
		<script>
			// If javascript is enabled (ie. this report is NOT opened from
			// within SharePoint or OneDrive), let's check 'javascript' input
			document.getElementById("javascript").checked = true;

			document.querySelectorAll('.diagram').forEach(function(svg) {
				var pz = Panzoom(svg, { maxScale: 8 });
				var scroll = svg.parentElement;
				svg.addEventListener('wheel', pz.zoomWithWheel);

				var btns = scroll.querySelectorAll('.zoom-btn');
				btns[0].addEventListener('click', function() { pz.zoomIn(); });
				btns[1].addEventListener('click', function() { pz.zoomOut(); });
				btns[2].addEventListener('click', function() { pz.reset(); });
			});
		</script>
	</body>
</html>
